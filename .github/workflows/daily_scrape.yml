name: Daily Current Affairs Scraper Pipeline

on:
  schedule:
    # 7:00 AM IST means 1:30 AM UTC
    - cron: '30 1 * * *'
  
  push:
    paths:
      - '.github/workflows/daily_scrape.yml'
      - 'scraper.py'
      
  workflow_dispatch:

jobs:
  run-scraper-pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install requests beautifulsoup4 trafilatura feedparser

    - name: Execute Scraper Engine
      run: |
        python scraper.py

    # 👉 FIX APPLIED HERE: Removed all.txt from git add command 👈
    - name: Commit and Push Generated Data Files
      run: |
        git config --global user.name "Ghost-Bot"
        git config --global user.email "bot@ghoststudio.internal"
        
        # Only tracking existing files now
        git add 1.json scraped_urls.json
        
        if git diff --staged --quiet; then
          echo "⚠️ No changes detected in data files. Skipping push."
        else
          git commit -m "🤖 Automate: Fresh Data Pipeline Synced [$(date -u +'%Y-%m-%d %H:%M:%S' -d '+5 hours +30 minutes') IST]"
          git push origin main
          echo "✅ Success: Repository synchronized flawlessly."
        fi
