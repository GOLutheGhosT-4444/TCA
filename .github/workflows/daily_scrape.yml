name: Daily Current Affairs Scraper Pipeline

on:
  schedule:
    # 7:00 AM IST means 1:30 AM UTC (GitHub Actions strictly works on UTC time)
    - cron: '30 1 * * *'
  
  push:
    # Jab bhi is workflow file ya master script me koi change push hoga, ye chalega
    paths:
      - '.github/workflows/daily_scrape.yml'
      - 'scraper.py'
      
  workflow_dispatch:
    # Isse tumhare Studio panel ke buttons aur GitHub UI se manually run karne ka control active rahega

jobs:
  run-scraper-pipeline:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Repository ka saara code runner machine me fetch karna
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # Step 2: Server par Python environment setup karna
    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.10'

    # Step 3: Scraper ke liye zaroori external dependencies install karna
    # (Agar tum BeautifulSuop ya Requests use kar rahe ho to unhe install karega)
    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Fallback agar requirements.txt nahi banayi ho to:
        pip install requests beautifulsoup4

    # Step 4: Scraper script ko execute karna aur data collect karna
    - name: Execute Scraper Engine
      run: |
        python scraper.py

    # Step 5: Naye generated 1.json data ko secure tarike se repo me commit aur push karna
    - name: Commit and Push Generated 1.json
      run: |
        git config --global user.name "Ghost-Bot"
        git config --global user.email "bot@ghoststudio.internal"
        
        # Check karna ki kya 1.json sach me create ya modify hua hai
        git add 1.json
        if git diff --staged --quiet; then
          echo "⚠️ No changes detected in 1.json. Skipping push."
        else
          git commit -m "🤖 Automate: Fresh Factual Data Scraped [$(date -u +'%Y-%m-%d %H:%M:%S' -d '+5 hours +30 minutes') IST]"
          git push
          echo "✅ Success: 1.json updated and repository synchronized."
        fi
