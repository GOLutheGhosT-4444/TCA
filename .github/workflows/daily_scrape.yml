name: Daily Current Affairs Scraper Pipeline

on:
  schedule:
    # 7:00 AM IST means 1:30 AM UTC
    - cron: '30 1 * * *'
  
  push:
    paths:
      - '.github/workflows/daily_scrape.yml'
      - 'scraper.py'
      
  workflow_dispatch:

jobs:
  run-scraper-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 👉 FIX APPLIED HERE: Added trafilatura explicitly in the dependencies 👈
    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Fallback dependencies including trafilatura
        pip install requests beautifulsoup4 trafilatura

    - name: Execute Scraper Engine
      run: |
        python scraper.py

    - name: Commit and Push Generated 1.json
      run: |
        git config --global user.name "Ghost-Bot"
        git config --global user.email "bot@ghoststudio.internal"
        
        git add 1.json
        if git diff --staged --quiet; then
          echo "⚠️ No changes detected in 1.json. Skipping push."
        else
          git commit -m "🤖 Automate: Fresh Factual Data Scraped [$(date -u +'%Y-%m-%d %H:%M:%S' -d '+5 hours +30 minutes') IST]"
          git push
          echo "✅ Success: 1.json updated and repository synchronized."
        fi
