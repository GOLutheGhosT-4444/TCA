name: Master AI Data Processor (Magic Pipeline)

on:
  workflow_run:
    # Trigger after scraper finishes
    workflows: ["Daily Current Affairs Scraper Pipeline"]
    types:
      - completed

  push:
    paths:
      - '.github/workflows/run_magic.yml'
      - 'magic.py'
      
  workflow_dispatch:

jobs:
  run-magic-pipeline:
    runs-on: ubuntu-latest
    
    # Run if triggered manually, pushed, or if scraper succeeded
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Wait for 10 Seconds Cooldown
      run: sleep 10

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Google New AI Dependency
      run: |
        python -m pip install --upgrade pip
        pip install google-genai

    # Execute Magic Engine using GitHub Secret Token
    - name: Execute Magic Engine (AI Processing)
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python magic.py

    # 👉 100% FIXED: Yahan detailed_points.json push hogi 👈
    - name: Commit and Push Master Output
      run: |
        git config --global user.name "Ghost-Bot"
        git config --global user.email "bot@ghoststudio.internal"
        
        git add detailed_points.json
        
        if git diff --staged --quiet; then
          echo "⚠️ No changes detected or processing failed. Skipping push."
        else
          git commit -m "🤖 Automate: Encrypted Data detailed_points.json Generated"
          git push origin main
          echo "✅ Success: detailed_points.json synchronized with repository."
        fi